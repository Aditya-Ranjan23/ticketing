<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ticketing{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-mid: #0f1629;
            --bg-card: rgba(15, 22, 41, 0.85);
            --bg-card-solid: #131b2e;
            --accent: #14b8a6;
            --accent-hover: #2dd4bf;
            --accent-dim: rgba(20, 184, 166, 0.15);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.12);
            --glow: 0 0 40px rgba(20, 184, 166, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }
        /* ASTITWA-style background: gradient + grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                linear-gradient(165deg, #0a0e17 0%, #0f1629 35%, #0d1322 70%, #0a0e17 100%);
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(20, 184, 166, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 184, 166, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            pointer-events: none;
        }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }
        /* Nav – glass style */
        nav {
            position: sticky;
            top: 0;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.85rem 1.5rem;
            z-index: 100;
        }
        nav .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        nav .logo { font-weight: 700; font-size: 1.25rem; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
        nav .logo span { color: var(--accent); }
        nav .links { display: flex; flex-wrap: wrap; gap: 1.5rem; align-items: center; }
        nav .links a {
            display: grid;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        nav .links a:hover { color: var(--accent); }
        /* Typography */
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        h2 { font-size: 1.35rem; font-weight: 600; margin-bottom: 0.5rem; }
        .muted { color: var(--text-muted); font-size: 0.9rem; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }
        /* Cards – ASTITWA-style */
        .card {
            background: var(--bg-card-solid);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem 1.75rem;
            margin-bottom: 1.25rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .card:hover { border-color: rgba(20, 184, 166, 0.25); box-shadow: var(--glow); }
        .btn {
            display: inline-block;
            padding: 0.6rem 1.25rem;
            background: var(--accent);
            color: #0a0e17;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        .btn-outline:hover { background: var(--accent-dim); color: var(--accent-hover); }
        /* Hero block for pages */
        .hero {
            text-align: center;
            padding: 3rem 1rem 2.5rem;
        }
        .hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .hero .sub { color: var(--text-muted); font-size: 1.05rem; }
        /* Messages */
        .messages { list-style: none; margin-bottom: 1rem; }
        .messages li { padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 0.5rem; }
        .messages .error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }
        .messages .success { background: rgba(20, 184, 166, 0.15); color: var(--accent); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="{% url 'event_list' %}" class="logo">Ticket<span>Hub</span></a>
            <div class="links">
                <a href="{% url 'event_list' %}">Events</a>
                <a href="{% url 'order_list' %}">My orders</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'signup' %}">Sign up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    {% if messages %}
    <div class="wrap">
        <ul class="messages">
            {% for message in messages %}
            <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
    <main class="wrap">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
